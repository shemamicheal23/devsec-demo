{% extends 'shema/base.html' %}

{% block title %}Profile - UAS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0">Your Profile</h3>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Username:</label>
                    <p>{{ user.username }}</p>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email:</label>
                    <p>{{ user.email|default:"Not provided" }}</p>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Date Joined:</label>
                    <p>{{ user.date_joined|date:"F d, Y" }}</p>
                </div>
                <hr>
                <div class="d-grid gap-2">
                    <a href="{% url 'password_change' %}" class="btn btn-warning">Change Password</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
