{% extends 'shema/base.html' %}

{% block title %}Password Updated | S-Auth Secure{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="glass-card position-relative overflow-hidden p-5">
            <!-- Decorative blur -->
            <div class="blur-blob" style="top: -20px; right: -20px; width: 150px; height: 150px; background: rgba(56, 189, 248, 0.2); filter: blur(40px);"></div>
            
            <div class="d-inline-flex p-3 rounded-circle" style="background: rgba(56, 189, 248, 0.1); color: #38bdf8; margin-bottom: 2rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            
            <h1 class="h3 fw-800 mb-3 gradient-text">Password Reset Complete</h1>
            <p class="text-white-50 mb-4 px-md-3">Your password has been successfully updated. You can now use your new credentials to sign in to your secure account.</p>
            
            <div class="d-grid pt-2">
                <a href="{% url 'login' %}" class="btn btn-primary rounded-pill px-4" id="login-link">Sign In Now</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
