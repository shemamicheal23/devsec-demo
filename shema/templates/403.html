{% extends 'shema/base.html' %}

{% block title %}403 Forbidden | S-Auth{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="glass-card position-relative overflow-hidden p-5">
            <div class="blur-blob" style="top: -50px; left: 10%; width: 250px; height: 250px; background: rgba(239, 68, 68, 0.4); filter: blur(60px); z-index: -1;"></div>
            
            <div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 rounded-circle text-danger mb-4" style="width: 80px; height: 80px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            
            <h1 class="gradient-text text-danger h2 mb-3">403 Forbidden</h1>
            <p class="text-white-50 mb-4">You do not have the required role-based permissions to access this area. The incident has been noted.</p>
            
            <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm px-4 rounded-pill">Return to Safety</a>
        </div>
    </div>
</div>
{% endblock %}
